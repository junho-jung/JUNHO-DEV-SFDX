<!-- Pms Team View Grid -->
<template>
  <div class="slds-p-around_medium">
    <template for:each={formattedData} for:item="team">
      <div key={team.id} class="slds-m-bottom_large">
        <template if:false={hideTeamHeader}>
          <div class="team-header slds-p-around_x-small">
            <strong>👥 {team.name}</strong>
          </div>
        </template>

        <div class="slds-scrollable_x">
          <table class="team-table slds-table slds-table_bordered slds-table_col-bordered">
            <thead>
            <tr class="slds-theme_shade team-summary-row">
              <td colspan="2" class="slds-text-align_left summary-label-cell">
                <div class="label-row">계약 합계 / 인원 (가동률)</div>
                <div class="label-row actual-label">실제 합계 / 인원 (가동률)</div>
              </td>

              <template for:each={team.colTotalsData} for:item="total">
                <td key={total.month} class="slds-text-align_center summary-data-cell">
                  <div class="contract-summary-line">
                    <span>{total.contract}</span> <span class="sep">/</span> <span class="count">{team.memberCount}</span>
                    <span class="util">({total.cUtil}%)</span>
                  </div>
                  <div class="actual-summary-line">
                    <span class="val-bold">{total.actual}</span> <span class="sep">/</span> <span class="count">{team.memberCount}</span>
                    <span class="util-bold">({total.aUtil}%)</span>
                  </div>
                </td>
              </template>

              <td class="slds-text-align_center slds-theme_inverse grand-total-cell">
                <div class="contract-summary-line" style="border-bottom: 1px dashed #666;">
                  <span>{team.grandTotal.contract}</span>
                  <span class="sep">/</span>
                  <span>{team.totalCapacity}</span>
                  <span class="util">({team.grandTotal.cUtil}%)</span>
                </div>
                <div class="actual-summary-line">
                  <span class="slds-text-title_bold">{team.grandTotal.actual}</span>
                  <span class="sep">/</span>
                  <span>{team.totalCapacity}</span>
                  <span class={team.grandTotal.aUtilClass}>({team.grandTotal.aUtil}%)</span>
                </div>
              </td>
            </tr>
            <!--            <tr class="slds-theme_shade">-->
            <!--              <td colspan="2" class="slds-text-align_left">-->
            <!--                <strong>월별 팀 합계 (C / A)</strong>-->
            <!--              </td>-->
            <!--              <template for:each={team.colTotalsData} for:item="total">-->
            <!--                <td key={total.actual} class="slds-text-align_center">-->
            <!--                  <div class="total-display-value">-->
            <!--                    <span class="total-contract">{total.contract}</span>-->
            <!--                    <span class="mm-separator"> / </span>-->
            <!--                    <span class="total-actual-bold">{total.actual}</span>-->
            <!--                  </div>-->
            <!--                </td>-->
            <!--              </template>-->
            <!--              <td class="slds-text-align_center slds-theme_inverse">-->
            <!--                <div class="slds-text-body_small">{team.teamContractGrandTotal} / <strong>{team.teamActualGrandTotal}</strong></div>-->
            <!--              </td>-->
            <!--            </tr>-->

            <tr>
              <th class="col-name">성명 (직급)</th>
              <th class="col-proj">참여 프로젝트</th>
              <template for:each={monthLabels} for:item="label">
                <th key={label} class="slds-text-align_center col-mm">{label}</th>
              </template>
              <th class="col-name slds-text-align_center">합계(C/A)</th>
            </tr>
            </thead>
            <tbody>
            <template for:each={team.memberList} for:item="member">
              <tr key={member.id}>
                <td class="cell-name">
                  <strong>{member.name}</strong><br/>
                  <span class="role-text">{member.role}</span>
                </td>

                <td class="cell-proj">
                  <template for:each={member.projectList} for:item="p">
                    <div key={p.id} class="project-name-label">• {p.name}</div>
                  </template>
                </td>

                <template for:each={member.monthlyData} for:item="month">
                  <td key={month.month} class={month.cellClass}>
                    <div class="detail-rows">
                      <template for:each={month.projects} for:item="pj">
                        <div key={pj.id} class="detail-val">
                          <template if:true={pj.isMM}>
                            {pj.contract} / {pj.actual}
                          </template>
                          <template if:false={pj.isMM}>
                            &nbsp;
                          </template>
                        </div>
                      </template>
                    </div>
                  </td>
                </template>
                <td class="slds-text-align_center slds-theme_shade">
                  <!--                  <div class="slds-text-body_small" title="계약 합계">{member.rowContractTotal}</div>-->
                  <!--                  <div class="slds-text-title_bold" title="실제 합계">{member.rowActualTotal}</div>-->
                  <div class="total-display-value">
                    <span class="total-contract">{member.rowContractTotal}</span>
                    <span class="mm-separator"> / </span>
                    <span class="total-actual-bold">{member.rowActualTotal}</span>
                  </div>
                </td>
              </tr>
            </template>
            </tbody>

            <!--            <tfoot>-->

            <!--                    <span class="total-contract">{total.contract}</span>-->
            <!--                    <span class="mm-separator"> / </span>-->
            <!--                    <span class="total-actual-bold">{total.actual}</span>-->
            <!--                  </div>-->
            <!--                </td>-->
            <!--              </template>-->
            <!--              <td class="slds-text-align_center slds-theme_inverse">-->
            <!--                <div class="slds-text-body_small">{team.teamContractGrandTotal} / <strong>{team.teamActualGrandTotal}</strong></div>-->
            <!--              </td>-->
            <!--            </tr>-->
            <!--            </tfoot>-->

          </table>
        </div>
      </div>
    </template>
  </div>
</template>
