<!-- Pms Project View Grid -->
<template>
  <div class="project-view-container">
    <template for:each={formattedData} for:item="project">
      <div key={project.id} class="project-card slds-m-bottom_large">

        <div class="slds-page-header slds-theme_shade project-header-bg">
          <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">

            <span class="slds-text-heading_small">
              📂 {project.name}
            </span>
            <template if:false={isReadOnly}>
              <lightning-button
                label="멤버 추가"
                icon-name="utility:add"
                variant="brand-outline"
                data-project-id={project.id}
                data-project-name={project.name}
                onclick={handleAddMemberClick}>
              </lightning-button>
            </template>
          </div>
        </div>

        <table class="slds-table slds-table_bordered slds-table_col-bordered custom-allocation-table">
          <thead>
          <tr>
            <th class="member-info-col">성명 (역할/팀)</th>
            <template for:each={monthLabels} for:item="label">
              <th key={label} class="slds-text-align_center mm-header-col">{label}</th>
            </template>
          </tr>
          </thead>
          <tbody>
          <template for:each={project.memberList} for:item="member">
            <tr key={member.pmKey} class={member.rowClass}>
              <td class="member-cell slds-cell-wrap">
                <div class="slds-grid slds-grid_vertical-align-center">
                  <template if:false={isReadOnly}>
                    <template if:false={member.isDeleted}>
                      <lightning-button-icon
                        icon-name="utility:close"
                        variant="bare"
                        alternative-text="멤버 삭제"
                        class="slds-m-right_small delete-btn-icon"
                        data-pm-key={member.pmKey}
                        data-project-id={project.id}
                        onclick={handleDeleteMemberClick}>
                      </lightning-button-icon>
                    </template>

                    <template if:true={member.isDeleted}>
                      <lightning-button-icon
                        icon-name="utility:refresh"
                        variant="bare"
                        alternative-text="삭제 취소"
                        class="slds-m-right_small restore-btn-icon"
                        data-pm-key={member.pmKey}
                        data-project-id={project.id}
                        onclick={handleRestoreMemberClick}>
                      </lightning-button-icon>
                    </template>
                  </template>

                  <div class={member.nameWrapperClass}>
                    <template lwc:if={isReadOnly}>
                      <strong class="member-name-text">{member.name}</strong>
                    </template>

                    <template lwc:else>
                      <a href="#"
                         onclick={handleMemberClick}
                         data-pm-id={member.pmId}
                         data-pm-key={member.pmKey}
                         data-project-id={project.id}
                         data-project-name={project.name}
                         class="member-name-link">
                        <strong>{member.name}</strong>
                      </a>
                    </template>
                    <br/>
                    <span class="slds-text-body_small">{member.role} | {member.grade} | {member.team}</span>
                  </div>
                </div>
              </td>

              <template for:each={member.cells} for:item="cell">
                <td key={cell.month} class="slds-p-around_none allocation-cell slds-is-relative">

                  <template lwc:if={isReadOnly}>
                    <div class="read-only-display">
                      <span>{cell.contract}</span>
                      <span class="mm-separator"> / </span>
                      <span class="actual-value-bold">{cell.actual}</span>
                    </div>
                  </template>

                  <template lwc:else>
                    <template lwc:if={cell.isReadOnly}>
                      <div class="read-only-display">
                        <span>{cell.contract}</span>
                        <span class="mm-separator"> / </span>
                        <span class="actual-value-bold">{cell.actual}</span>
                      </div>
                    </template>

                    <template lwc:else>
                      <div class="edit-input-wrapper">
                        <input type="text"
                               inputmode="decimal"
                               value={cell.contract}
                               oninput={handleInputChange}
                               onclick={handleInputClick}
                               onblur={handleBlur}
                               onkeydown={handleKeyDown}
                               data-key={cell.compositeKey}
                               data-type="contract"
                               class="mm-input-field">
                        <span class="mm-separator">/</span>
                        <input type="text"
                               inputmode="decimal"
                               value={cell.actual}
                               oninput={handleInputChange}
                               onclick={handleInputClick}
                               onblur={handleBlur}
                               onkeydown={handleKeyDown}
                               data-key={cell.compositeKey}
                               data-type="actual"
                               class="mm-input-field actual-focus">

                        <template if:true={cell.isDirty}>
                          <span class="dirty-indicator">*</span>
                        </template>
                      </div>
                    </template>
                  </template>
                </td>
              </template>
            </tr>
          </template>
          </tbody>

          <tfoot class="project-summary-footer">
          <tr class="slds-theme_shade">
            <td class="slds-text-align_left">
              <strong>프로젝트별 팀 합계 (C / A)</strong>
            </td>
            <template for:each={project.monthlyTotals} for:item="total">
              <td key={total.month} class="slds-text-align_center">
                <div class="total-display-value">
                  <span class="total-contract">{total.contractTotal}</span>
                  <span class="mm-separator"> / </span>
                  <span class="total-actual-bold">{total.actualTotal}</span>
                </div>
              </td>
            </template>
          </tr>
          </tfoot>
        </table>
      </div>
    </template>
  </div>
</template>
